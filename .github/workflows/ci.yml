name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --legacy-peer-deps --no-audit --no-fund
      - run: npm run check:static-db
      - run: npm run test:autopilot

  build:
    needs: unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --legacy-peer-deps --no-audit --no-fund
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
