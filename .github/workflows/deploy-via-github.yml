name: Deploy to Vercel via GitHub

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Skip Vercel deploy (token missing)
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: echo "VERCEL_TOKEN is not set. Skipping Vercel deployment."

      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: |
          npx vercel --prod --yes --token "$VERCEL_TOKEN" --archive=tgz
