[build]
  # Source build-only env vars from script, then run build.
  # Non-secret config defaults are in config/env-defaults.json (inlined at
  # build time via next.config.js and loaded at runtime via instrumentation.ts).
  # This keeps Functions env under 4KB limit — only secrets from the Netlify
  # Dashboard are injected into Functions.
  command = "source scripts/netlify-build-env.sh && npm run build"
  publish = ".next"

[build.processing]
  skip_processing = true

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # ============================================================================
  # MINIMAL FUNCTION ENV — must stay under 4 KB total (including Dashboard vars)
  # ============================================================================
  # Only keep vars here that Netlify's platform needs before/after the build.
  # Everything else goes into:
  #   - scripts/netlify-build-env.sh  (build-only vars, not in Functions)
  #   - config/env-defaults.json      (non-secret defaults, inlined at build)
  #   - Netlify Dashboard             (secrets, scoped to appropriate context)
  # ============================================================================

  NODE_VERSION = "20"

  # Suppress false-positive secrets scanning on server-side Next.js bundles.
  # These MUST be in [build.environment] (not the build script) because the
  # secrets scanner runs as a post-build step outside the shell session.
  SECRETS_SCAN_OMIT_PATHS = ".next/cache,.next/server,.next/static"

  # Tell the secrets scanner to ignore these env var names whose values may
  # appear in git history or committed config/docs files.
  # This MUST be in [build.environment] — exporting it only in the build
  # script does not work because the scanner runs after the shell exits.
  SECRETS_SCAN_OMIT_KEYS = "ACCESS_TOKEN_SECRET,ACCOUNTING_EXPORT_SECRET,ADMIN_API_TOKEN,ADMIN_PASSWORT,ADMIN_PASSWORD,ADMIN_SESSION_SECRET,AI_PREFERRED,AI_PROVIDER,AI_PROVIDER_ORDER,CRON_SECRET,CVE_API_URL,DATABASE_URL,DEEPSEEK_API_KEY,DISCORD_WEBHOOK_URL,ENTERPRISE_API_KEYS,GEMINI_API_KEY,GEMINI_MODEL,GITHUB_TOKEN,GOOGLE_INDEXER_KEY,HEYGEN_API_KEY,INTEL_API_KEY,MAGIC_LINK_SECRET,NETLIFY_API_KEY,NETLIFY_AUTH_TOKEN,NETLIFY_ACCOUNT_ID,NETLIFY_SITE_ID,NEWSLETTER_UNSUBSCRIBE_SECRET,NEXTAUTH_SECRET,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,NVD_API_KEY,OPENAI_API_KEY,REDIS_URL,RESEND_API_KEY,SECURITY_CHECK_SECRET,SENTINEL_NOTIFY_URL,SESSION_SECRET,STRIPE_METERED_PRICE_ID,STRIPE_PRICE_DAYPASS,STRIPE_PRICE_ENTERPRISE,STRIPE_PRICE_INCIDENT,STRIPE_PRICE_MSP,STRIPE_PRICE_PRO,STRIPE_PRICE_PRO_MONTHLY,STRIPE_PRICE_PRO_YEARLY,STRIPE_PRICE_SPRINT,STRIPE_PRICE_TEAM,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,UPSTASH_REDIS_REST_TOKEN,UPSTASH_REDIS_REST_URL,V1_CHECK_INDICATOR_SECRET"