name: Security Data Sync

on:
  schedule:
    # Run daily at 03:00 UTC – fetches fresh CVEs from NVD and GitHub Advisory
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger vulnerability sync
        run: |
          # GitHub Actions passes unset secrets as empty strings via env vars.
          # Skip gracefully instead of failing with a malformed URL.
          if [ -z "$CRON_SECRET" ] || [ -z "$SITE_URL" ]; then
            echo "CRON_SECRET or SITE_URL secret is not configured – skipping sync."
            exit 0
          fi
          curl -s --fail-with-body \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/agents/vulnerability"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
