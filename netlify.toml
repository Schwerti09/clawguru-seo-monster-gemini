[build]
  command = "npm run build"
  publish = ".next"

[build.processing]
  skip_processing = true

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # Install devDependencies (typescript, @types/*) even though NODE_ENV=production
  NPM_CONFIG_PRODUCTION = "false"
  # Suppress false-positive secrets scanning on server-side Next.js bundles.
  # The detected values are runtime env vars read server-side only — never exposed to clients.
  SECRETS_SCAN_OMIT_PATHS = ".next/cache,.next/server"
  # Skip scanning for specific env var keys that exist in git history (test keys, already rotated)
  # The secrets were removed in commit 22da5b28 but remain in git history. These are Stripe TEST keys.
  # IMPORTANT: Rotate these keys in Stripe Dashboard since they're exposed in git history!
  SECRETS_SCAN_OMIT_KEYS = "STRIPE_SECRET_KEY,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,ACCESS_TOKEN_SECRET,STRIPE_PRICE_DAYPASS,STRIPE_PRICE_PRO,STRIPE_PRICE_TEAM,STRIPE_PRICE_ENTERPRISE"
  # Build-only variables (not attached to functions, stay under 4KB limit)
  NEXT_PUBLIC_SITE_URL = "https://clawguru.org"
  SITE_URL = "https://clawguru.org"
  NEXT_PUBLIC_BASE_URL = "https://clawguru.org"
  NEXT_PUBLIC_ADMIN_UI = "1"
  NEXT_DISABLE_ESLINT = "1"
  NEXT_DISABLE_TYPE_CHECK = "1"
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=6144"
  GEO_MATRIX_SITEMAP = "1"
  SITEMAP_BUCKETS = "5"
  SITEMAP_ALLOW_CHUNK = "1"
  SITEMAP_QUALITY_STRICT = "1"
  SITEMAP_RUNBOOKS_PER_BUCKET = "2000"
  SITEMAP_INCLUDE_SYNTHETIC_100K = "0"
  SITEMAP_100K_LOCALES = "de,en,es,fr,pt,it,ru,zh,ja,ko,ar,hi,tr,pl,nl,af"
  SITEMAP_100K_PAGES = "42"
  PSEO_RUNBOOK_COUNT = "50000"
  PSEO_ALLOW_SYNTHETIC_100K = "0"
  MIN_AVG_QUALITY = "86"
  MIN_VARIANTS = "3"
  MAX_PROMOTIONS = "10"
  GEO_MATRIX_ENABLED = "1"
  GEO_MATRIX_AUTO_REWRITE = "1"
  GEO_MATRIX_MIN_QUALITY = "72"
  GEO_MATRIX_SITEMAP_CITY_LIMIT = "50"
  GEO_MATRIX_SITEMAP_CITY_POOL = "72"
  GEO_MATRIX_SITEMAP_SEED_LIMIT = "8"
  GEO_INDEX_HEALTH_BASE = "https://clawguru.org"
  GEO_INDEX_HEALTH_CITY_LIMIT = "12"
  OBS_ENABLED = "0"
  OBS_SAMPLE_RATE = "0.1"