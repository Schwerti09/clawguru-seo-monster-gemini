name: Deploy to Netlify

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Verify build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
