<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b8ff" stop-opacity="0.9" />
      <stop offset="60%" stop-color="#00b8ff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#00b8ff" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" />
    </filter>
    <style>
      @keyframes pulse { 0% { transform: scale(0.96); opacity: .8 } 50% { transform: scale(1.04); opacity: 1 } 100% { transform: scale(0.96); opacity: .8 } }
      @keyframes orbit { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
    </style>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#06070b" />
  <!-- Mycelium glow -->
  <g style="transform-origin: 32px 32px; animation: orbit 16s linear infinite;">
    <circle cx="32" cy="32" r="18" fill="url(#glow)" filter="url(#soft)" />
  </g>
  <!-- Claw mark -->
  <g fill="#d4af37" style="transform-origin: 32px 32px; animation: pulse 2.4s ease-in-out infinite;">
    <path d="M22 40c2.5-4 5-8 8-12 1.1-1.4 2.9-1.6 4.2-.4l.2.2c.9.9 1 2.3.2 3.3-3 3.8-6 7.7-9 11.6-1.2 1.5-3.6 1.4-4.6-.3-.3-.5-.3-1.2 0-1.8z"/>
    <path d="M29 38c2.2-3.3 4.5-6.7 6.7-10 .8-1.2 2.5-1.5 3.6-.6l.2.2c.9.8 1.1 2.2.4 3.2-2.5 3.6-4.9 7.2-7.4 10.8-1 1.4-3.1 1.4-4.1 0-.4-.5-.4-1.3.1-1.9z"/>
    <path d="M36 36c1.8-2.7 3.6-5.4 5.4-8 .7-1.1 2.2-1.4 3.3-.7l.2.2c1 .7 1.2 2.1.6 3.1-1.8 2.9-3.7 5.8-5.6 8.7-.9 1.3-2.8 1.4-3.8.2-.4-.5-.4-1.3-.1-1.9z"/>
  </g>
</svg>
