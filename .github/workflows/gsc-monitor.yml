name: GSC Monitor

on:
  schedule:
    - cron: '0 6 * * *' # every day at 06:00 UTC
  workflow_dispatch: {}

jobs:
  fetch-gsc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm ci

      - name: Fetch GSC metrics
        env:
          INDEXAPI_SERVICE_ACCOUNT: ${{ secrets.INDEXAPI_SERVICE_ACCOUNT }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: |
          node scripts/gsc/fetch-daily-metrics.js

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsc-metrics
          path: data/gsc-metrics/
