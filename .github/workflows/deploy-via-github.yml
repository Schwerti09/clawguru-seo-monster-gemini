name: Deploy to Vercel via GitHub

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build site
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Skip Vercel deploy (token missing)
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: echo "VERCEL_TOKEN is not set. Skipping Vercel deployment."

      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: |
          npx vercel --prod --yes --token "$VERCEL_TOKEN" --archive=tgz
