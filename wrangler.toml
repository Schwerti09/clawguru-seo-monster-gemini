# Cloudflare Pages configuration for clawguru.org
# Build command and output directory
name = "clawguru-seo-monster-gemini"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
# Cloudflare Pages has ~4GB RAM available. Use 3584MB to leave headroom for OS.
# Skip linting and type checking to save memory during the CF Pages build.
command = "NEXT_DISABLE_ESLINT=1 NEXT_DISABLE_TYPE_CHECK=1 NODE_OPTIONS='--max-old-space-size=3584' npm run build"
cwd = "."
watch_dirs = ["app"]

[build.environment]
NODE_VERSION = "20"
NEXT_TELEMETRY_DISABLED = "1"
NEXT_PUBLIC_SITE_URL = "https://clawguru.org"
SITE_URL = "https://clawguru.org"
NEXT_PUBLIC_BASE_URL = "https://clawguru.org"
NEXT_PUBLIC_ADMIN_UI = "1"
NEXT_DISABLE_ESLINT = "1"
NEXT_DISABLE_TYPE_CHECK = "1"
# Cloudflare Pages build machines have ~4GB RAM. Use 3584MB to stay safe.
NODE_OPTIONS = "--max-old-space-size=3584"
GEO_MATRIX_SITEMAP = "1"
SITEMAP_BUCKETS = "5"
SITEMAP_ALLOW_CHUNK = "1"
SITEMAP_QUALITY_STRICT = "1"
SITEMAP_RUNBOOKS_PER_BUCKET = "2000"
SITEMAP_INCLUDE_SYNTHETIC_100K = "0"
SITEMAP_100K_LOCALES = "de,en,es,fr,pt,it,ru,zh,ja,ko,ar,hi,tr,pl,nl,af"
SITEMAP_100K_PAGES = "42"
PSEO_RUNBOOK_COUNT = "50000"
PSEO_ALLOW_SYNTHETIC_100K = "0"
MIN_AVG_QUALITY = "86"
MIN_VARIANTS = "3"
MAX_PROMOTIONS = "10"
INTERNAL_PSEO_STATS_SECRET = ""
CRON_SECRET = ""
GEO_MATRIX_ENABLED = "1"
GEO_MATRIX_AUTO_REWRITE = "1"
GEO_MATRIX_MIN_QUALITY = "72"
GEO_MATRIX_SITEMAP_CITY_LIMIT = "50"
GEO_MATRIX_SITEMAP_CITY_POOL = "72"
GEO_MATRIX_SITEMAP_SEED_LIMIT = "8"
GEO_INDEX_HEALTH_BASE = "https://clawguru.org"
GEO_INDEX_HEALTH_CITY_LIMIT = "12"
OBS_ENABLED = "0"
OBS_SAMPLE_RATE = "0.1"
NVD_API_KEY = ""

# Runtime environment variables (add in Cloudflare Dashboard)
# DATABASE_URL, REDIS_URL, ACCESS_TOKEN_SECRET, NEXTAUTH_SECRET, SESSION_SECRET,
# ADMIN_SESSION_SECRET, ADMIN_USERNAME, ADMIN_PASSWORT, ADMIN_EMAIL, ADMIN_API_TOKEN,
# AI_PROVIDER, AI_PREFERRED, DEEPSEEK_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY,
# RESEND_API_KEY, SECURITY_CHECK_SECRET, V1_CHECK_INDICATOR_ENFORCE_AUTH,
# V1_CHECK_INDICATOR_SECRET, V1_INTEL_REQUIRE_AUTH, V1_RUNBOOK_REAL_DATA,
# V1_RUNBOOK_REQUIRE_AUTH, STRIPE_PRICE_MSP, MW_RL_ENABLED
